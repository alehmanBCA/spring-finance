<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/home.css}" />
    <link rel="stylesheet" th:href="@{/general.css}" />
    <link rel="stylesheet" th:href="@{/transactions.css}" />
</head>
<body>
<div class="container">
    <h1 class="title-text">New Transaction</h1>
    <p class="transactions-link"><a th:href="@{/transactions}">Back to transactions</a></p>

    <form class="tx-form" th:action="@{/transactions}" th:object="${transaction}" method="post">
        <div class="form-row">
            <label for="date">Date</label>
            <input type="date" id="date" th:field="*{date}" />
            <div class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div>

        <div class="form-row">
            <label for="description">Description</label>
            <input type="text" id="description" th:field="*{description}" />
            <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="form-row">
            <label for="category">Category</label>
            <input type="text" id="category" th:field="*{category}" />
        </div>

        <div class="form-row">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" id="amount" th:field="*{amount}" />
            <div class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
        </div>

        <div class="form-row">
            <label for="type">Type</label>
            <select id="type" th:field="*{type}">
                <option value="DEBIT">DEBIT</option>
                <option value="CREDIT">CREDIT</option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="form-row">
            <button type="submit">Save</button>
        </div>
    </form>
</div>
</body>
</html>
